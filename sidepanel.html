<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>DualRead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="dr-root" data-screen="translate-empty" data-lang="zh-CN">

    <!-- ───── Welcome (no header) ───── -->
    <section class="dr-screen dr-welcome" data-screen="welcome">
      <div class="dr-welcome__logo"><div class="dr-logo dr-logo--lg">D</div></div>
      <div class="dr-welcome__hello" data-i18n="welcomeHello"></div>
      <h1 class="dr-welcome__heading" data-i18n="welcomeHeading"></h1>
      <p class="dr-welcome__body" data-i18n="welcomeBody"></p>

      <div class="dr-welcome__level-group">
        <div class="dr-welcome__level-prompt" data-i18n="levelPrompt"></div>
        <div class="dr-welcome__levels">
          <button class="dr-level" data-level="A2" data-i18n="levelA2"></button>
          <button class="dr-level dr-level--active" data-level="B1" data-i18n="levelB1"></button>
          <button class="dr-level" data-level="B2" data-i18n="levelB2"></button>
          <button class="dr-level" data-level="C1" data-i18n="levelC1"></button>
        </div>
      </div>

      <div class="dr-welcome__spacer"></div>

      <button class="dr-btn dr-btn--primary" data-action="welcome-start" data-i18n="welcomeCta"></button>
      <button class="dr-btn dr-btn--ghost" data-action="welcome-settings" data-i18n="welcomeSkip"></button>
    </section>

    <!-- ───── Header (shared by translate / vocab / settings) ───── -->
    <header class="dr-header">
      <div class="dr-header__top">
        <div class="dr-logo dr-logo--sm">D</div>
        <div class="dr-header__title" data-i18n="appName"></div>
        <div class="dr-header__spacer"></div>
        <button class="dr-icon-btn" title="Recent">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
            <circle cx="7" cy="7" r="5.5" />
            <path d="M7 4v3l2 1.5" />
          </svg>
        </button>
      </div>
      <nav class="dr-tabs">
        <button class="dr-tab dr-tab--active" data-tab="translate" data-i18n="translate"></button>
        <button class="dr-tab" data-tab="vocab" data-i18n="vocab"></button>
        <button class="dr-tab" data-tab="settings" data-i18n="settings"></button>
      </nav>
    </header>

    <main class="dr-main">

      <!-- ───── Translate — empty ───── -->
      <section class="dr-screen dr-translate-empty" data-screen="translate-empty">
        <div class="dr-translate-empty__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 5h7M6.5 5v10M4 15h5" />
            <path d="M14 10h7M14 10l3 9m4-9l-3 9m-5-3h6" />
          </svg>
        </div>
        <div class="dr-translate-empty__title" data-i18n="selectPrompt"></div>
        <div class="dr-translate-empty__hint" data-i18n="selectHint"></div>
      </section>

      <!-- ───── Translate — filled ───── -->
      <section class="dr-screen dr-translate" data-screen="translate">
        <div class="dr-translate__block">
          <div class="dr-meta-label" data-i18n="selectionLabel"></div>
          <div class="dr-translate__word" data-slot="word"></div>
          <div class="dr-translate__ipa" data-slot="ipa"></div>
        </div>

        <div class="dr-divider"></div>

        <div class="dr-translate__block">
          <div class="dr-meta-label" data-i18n="translationLabel"></div>
          <div class="dr-translate__translation" data-slot="translation"></div>
          <div class="dr-translate__translation-sub" data-slot="translation-sub"></div>
        </div>

        <div class="dr-translate__context">
          <div class="dr-meta-label" data-i18n="contextLabel"></div>
          <div class="dr-translate__context-text" data-slot="context"></div>
          <div class="dr-translate__source">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M4 5.5l-1 1a1.5 1.5 0 01-2-2l2-2a1.5 1.5 0 012 0M6 4.5l1-1a1.5 1.5 0 012 2l-2 2a1.5 1.5 0 01-2 0" />
            </svg>
            <span data-slot="source"></span>
          </div>
        </div>

        <div class="dr-translate__spacer"></div>

        <div class="dr-translate__actions">
          <button class="dr-btn dr-btn--primary dr-btn--save" data-action="save-word">
            <svg class="dr-icon-save" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 2h8v10l-4-2.5L3 12V2z" /></svg>
            <svg class="dr-icon-saved" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l3.5 3.5L12 4" /></svg>
            <span class="dr-btn__label dr-btn__label--save" data-i18n="saveBtn"></span>
            <span class="dr-btn__label dr-btn__label--saved" data-i18n="savedBtn"></span>
          </button>
          <button class="dr-btn dr-btn--icon" data-action="add-note" data-i18n-title="addNote">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 11L11 2l1.5 1.5L3.5 12.5 2 13v-2z" /></svg>
          </button>
        </div>
        <div class="dr-translate__powered" data-i18n="poweredBy"></div>
      </section>

      <!-- ───── Vocab — empty ───── -->
      <section class="dr-screen dr-vocab-empty" data-screen="vocab-empty">
        <div class="dr-vocab-empty__card">
          <div class="dr-vocab-empty__line dr-vocab-empty__line--1"></div>
          <div class="dr-vocab-empty__line dr-vocab-empty__line--2"></div>
          <div class="dr-vocab-empty__line dr-vocab-empty__line--3"></div>
        </div>
        <div class="dr-vocab-empty__title" data-i18n="vocabEmpty"></div>
        <div class="dr-vocab-empty__body" data-i18n="vocabEmptyBody"></div>
      </section>

      <!-- ───── Vocab — filled ───── -->
      <section class="dr-screen dr-vocab" data-screen="vocab">
        <div class="dr-vocab__toolbar">
          <div class="dr-search">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="5.5" cy="5.5" r="4" />
              <path d="M8.5 8.5L12 12" />
            </svg>
            <input class="dr-search__input" type="search" data-i18n-placeholder="searchPlaceholder" />
          </div>
          <div class="dr-vocab__toolbar-row">
            <div class="dr-vocab__count" data-slot="count"></div>
            <div class="dr-vocab__spacer"></div>
            <div class="dr-vocab__sort">
              <span data-slot="sort-label"></span>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4l3 3 3-3" /></svg>
            </div>
            <button class="dr-vocab__export" data-action="export-csv">
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5.5 1v7M3 6l2.5 2.5L8 6M1 10h9" /></svg>
              <span data-i18n="export"></span>
            </button>
          </div>
        </div>

        <div class="dr-vocab__quota" data-slot="quota" hidden>
          <div class="dr-vocab__quota-icon">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M7 1l6 11H1L7 1zM7 5v3M7 10v.5" /></svg>
          </div>
          <div class="dr-vocab__quota-text">
            <div class="dr-vocab__quota-title" data-i18n="quotaNear"></div>
            <div class="dr-vocab__quota-body" data-i18n="quotaBody"></div>
          </div>
        </div>

        <div class="dr-vocab__list" data-slot="vocab-list"></div>
      </section>

      <!-- ───── Settings ───── -->
      <section class="dr-screen dr-settings" data-screen="settings">
        <div class="dr-settings__row">
          <div class="dr-settings__row-text">
            <div class="dr-settings__row-title" data-i18n="highlightAuto"></div>
            <div class="dr-settings__row-subtitle" data-i18n="highlightAutoHint"></div>
          </div>
          <button class="dr-toggle dr-toggle--on" data-action="toggle-highlight" role="switch" aria-checked="true">
            <span class="dr-toggle__knob"></span>
          </button>
        </div>

        <div class="dr-settings__group">
          <div class="dr-settings__group-title" data-i18n="highlightStyle"></div>
          <div class="dr-settings__style-grid">
            <button class="dr-style-option dr-style-option--active" data-style="underline">
              <div class="dr-style-option__preview">
                <span class="dr-style-preview dr-style-preview--underline">profound</span>
              </div>
              <div class="dr-style-option__label" data-i18n="highlightUnderline"></div>
            </button>
            <button class="dr-style-option" data-style="background">
              <div class="dr-style-option__preview">
                <span class="dr-style-preview dr-style-preview--background">profound</span>
              </div>
              <div class="dr-style-option__label" data-i18n="highlightBackground"></div>
            </button>
          </div>
        </div>

        <div class="dr-settings__group">
          <div class="dr-settings__group-title" data-i18n="uiLanguage"></div>
          <div class="dr-lang-toggle">
            <button class="dr-lang-toggle__btn dr-lang-toggle__btn--active" data-lang-choice="zh-CN" data-i18n="zh"></button>
            <button class="dr-lang-toggle__btn" data-lang-choice="en" data-i18n="en"></button>
          </div>
        </div>

        <div class="dr-settings__group">
          <div class="dr-settings__group-title" data-i18n="syncStatus"></div>
          <div class="dr-sync">
            <div class="dr-sync__dot"></div>
            <div class="dr-sync__text">
              <div class="dr-sync__status" data-i18n="synced"></div>
              <div class="dr-sync__detail" data-slot="sync-detail"></div>
            </div>
            <button class="dr-icon-btn" title="Refresh">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 6.5A4.5 4.5 0 112 4M11 2v2.5H8.5" /></svg>
            </button>
          </div>
        </div>

        <div class="dr-settings__spacer"></div>

        <div class="dr-danger">
          <div class="dr-danger__title" data-i18n="clearData"></div>
          <div class="dr-danger__body" data-i18n="clearDataHint"></div>
          <button class="dr-danger__btn" data-action="clear-data" data-i18n="clearData"></button>
        </div>
      </section>

    </main>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
