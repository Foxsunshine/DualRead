# ADR-A21 defense layer 2: client-side secret scan before commit lands.
# Layer 1 = .gitignore blocks .env from staging.
# Layer 3 = GitHub push protection (server-side, enabled in repo settings).
# Layer 4 = Anthropic / OpenAI account-level hard cap (deferred — set
#           before issuing the first API key).
#
# Bootstrap (run once per clone):
#   brew install pre-commit   # or: pip install pre-commit
#   pre-commit install        # wires .git/hooks/pre-commit
#
# Manual full-history scan (CI or audit):
#   gitleaks detect --source . --redact -v
#
# `rev:` pins gitleaks so a compromised upstream tag can't silently
# weaken our scan. Bump deliberately when upgrading.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
