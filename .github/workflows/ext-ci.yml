# Extension repo CI — read-only checks on every push and PR.
# Deliberately holds NO secrets so a compromised PR can't exfiltrate
# credentials. Production publish path lives in publish.yml and runs
# only on tagged releases with explicitly scoped secrets.
name: ext-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (clean)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (smoke)
        run: npm run build
