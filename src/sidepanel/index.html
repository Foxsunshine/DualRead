<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>DualRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Font stack (v2.1 / D62; v2.2 D3 + P0-7 added Noto Sans JP):
        - Inter            — body sans (CDN)
        - Fraunces         — display serif (CDN, variable axes)
        - JetBrains Mono   — IPA / code / meta labels (CDN)
        - Noto Sans SC     — Chinese fallback (CDN)
        - Noto Sans JP     — Japanese kana + JIS kanji. NOT loaded here —
          self-hosted via @fontsource/noto-sans-jp imported in main.tsx.
          Keeping the CDN host_permissions surface stable between v2.0
          and v2.2 avoids triggering CWS full re-review.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,400..500,0..100&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
