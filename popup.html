<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>双语翻译器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fff; color: #1a1a1a; }
    .header { padding: 14px 16px 12px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; display: flex; align-items: center; gap: 10px; position: relative; }
    .header-icon { font-size: 22px; }
    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .section { padding: 13px 16px; border-bottom: 1px solid #f0f0f0; }
    .section:last-child { border-bottom: none; }
    .label { font-size: 10px; color: #999; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
    .engine-group { display: flex; gap: 8px; }
    .engine-btn { flex: 1; padding: 9px 6px 8px; border: 1.5px solid #e8e8e8; border-radius: 10px; font-size: 12px; font-family: inherit; cursor: pointer; background: #fafafa; color: #666; transition: all 0.15s; text-align: center; line-height: 1.4; }
    .engine-btn .e-name { font-weight: 600; font-size: 13px; display: block; }
    .engine-btn .e-desc { font-size: 10px; opacity: 0.7; }
    .engine-btn.active-google { border-color: #4285F4; background: #e8f0fe; color: #1967d2; }
    .engine-btn.active-gemini { border-color: #1e6b3c; background: #e6f4ea; color: #1e6b3c; }
    .apikey-wrap { margin-top: 10px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: none; } }
    .apikey-row { display: flex; gap: 6px; align-items: center; }
    .apikey-input { flex: 1; padding: 8px 10px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 12px; font-family: 'Courier New', monospace; color: #333; background: #fafafa; outline: none; transition: border-color 0.15s; }
    .apikey-input:focus { border-color: #c17d3c; }
    .apikey-input::placeholder { font-family: inherit; color: #bbb; font-size: 11px; }
    .btn-save { padding: 8px 12px; background: #c17d3c; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
    .btn-save:hover { opacity: 0.88; }
    .apikey-tip { font-size: 10.5px; color: #aaa; margin-top: 6px; line-height: 1.5; }
    .apikey-tip a { color: #c17d3c; text-decoration: none; }
    .apikey-status { font-size: 11px; margin-top: 5px; min-height: 16px; font-weight: 500; }
    .apikey-status.ok { color: #34A853; }
    .apikey-status.err { color: #e53935; }
    select { width: 100%; padding: 8px 10px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fafafa; cursor: pointer; outline: none; transition: border-color 0.15s; }
    select:focus { border-color: #4285F4; }
    .mode-group { display: flex; gap: 8px; }
    .mode-btn { flex: 1; padding: 8px 6px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 12px; font-family: inherit; cursor: pointer; background: #fafafa; color: #555; transition: all 0.15s; text-align: center; }
    .mode-btn.active { border-color: #4285F4; background: #e8f0fe; color: #1967d2; font-weight: 600; }
    .page-btns { display: flex; flex-direction: column; gap: 8px; }
    .btn { width: 100%; padding: 10px 14px; border: none; border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; font-weight: 500; }
    .btn-primary { background: linear-gradient(135deg, #4285F4, #34A853); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: #f5f5f5; color: #555; }
    .btn-secondary:hover { background: #ebebeb; }
    .status { font-size: 12px; color: #34A853; text-align: center; min-height: 18px; margin-top: 6px; }
    .tip { font-size: 11px; color: #aaa; line-height: 1.5; margin-top: 8px; }
    .tip strong { color: #666; }
    .hidden { display: none !important; }
    /* Toggle switch */
    .toggle-wrap { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; }
    .toggle-label { font-size: 10px; opacity: 0.7; }
    .toggle { position: relative; width: 36px; height: 20px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; transition: background 0.2s; border: none; padding: 0; }
    .toggle::after { content: ''; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px; background: rgba(255,255,255,0.6); border-radius: 50%; transition: all 0.2s; }
    .toggle.on { background: #34A853; }
    .toggle.on::after { left: 18px; background: white; }
    body.ext-off .section { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🌐</div>
  <div class="header-text">
    <h1>双语对照翻译器</h1>
    <p>原文 + 译文同时显示，不破坏页面布局</p>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label" id="toggleLabel">OFF</span>
    <button class="toggle" id="toggleBtn"></button>
  </div>
</div>

<div class="section">
  <div class="label">翻译引擎</div>
  <div class="engine-group">
    <button class="engine-btn" id="eng-google" data-engine="google">
      <span class="e-name">🔵 Google</span>
      <span class="e-desc">免费 · 无需配置</span>
    </button>
    <button class="engine-btn" id="eng-gemini" data-engine="gemini">
      <span class="e-name">✦ Gemini</span>
      <span class="e-desc">免费大额度 · 需 Key</span>
    </button>
  </div>
  <div class="apikey-wrap hidden" id="gemini-apikey-section">
    <div class="apikey-row">
      <input class="apikey-input" id="geminiKeyInput" type="password" placeholder="AIzaSy..." autocomplete="off" spellcheck="false" />
      <button class="btn-save" id="saveGeminiKeyBtn">保存</button>
    </div>
    <div class="apikey-status" id="geminiKeyStatus"></div>
    <div class="apikey-tip">
      在 <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> 免费获取 Key（每天 1500 次请求免费）。Key 仅存储在本地，不上传任何服务器。
    </div>
  </div>
</div>

<div class="section">
  <div class="label">翻译目标语言</div>
  <select id="targetLang">
    <option value="zh-CN">🇨🇳 中文（简体）</option>
    <option value="zh-TW">🇹🇼 中文（繁体）</option>
    <option value="en">🇺🇸 English</option>
    <option value="ja">🇯🇵 日本語</option>
    <option value="ko">🇰🇷 한국어</option>
    <option value="fr">🇫🇷 Français</option>
    <option value="de">🇩🇪 Deutsch</option>
    <option value="es">🇪🇸 Español</option>
    <option value="pt">🇵🇹 Português</option>
    <option value="ru">🇷🇺 Русский</option>
    <option value="ar">🇸🇦 العربية</option>
  </select>
</div>

<div class="section">
  <div class="label">翻译模式</div>
  <div class="mode-group">
    <button class="mode-btn active" data-mode="tooltip">💬 划词气泡</button>
    <button class="mode-btn" data-mode="inline">📄 全页双语</button>
  </div>
  <div class="tip">
    <strong>划词气泡</strong>：选中文字后弹出翻译<br>
    <strong>全页双语</strong>：在每段原文下方插入译文
  </div>
</div>

<div class="section">
  <div class="label">页面操作</div>
  <div class="page-btns">
    <button class="btn btn-primary" id="translatePageBtn">📄 翻译整个页面（双语对照）</button>
    <button class="btn btn-secondary" id="restoreBtn">↩ 还原页面原文</button>
  </div>
  <div class="status" id="status"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
